# quality-gate.yml — Legion / OpenManus
# SAFE-PORT advisory quality-gate (PROP-2026-0714-001, 2026-07-15)
# Mode: ADVISORY — all gate steps use continue-on-error: true.
# No Banxe-specific rules, no FCA invariants, no banxe semgrep rulesets.

name: quality-gate (advisory)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality-gate:
    name: Quality Gate (advisory — non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true  # advisory: never blocks merge

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pytest-cov

      - name: Lint (ruff check)
        continue-on-error: true
        run: ruff check .

      - name: Format check (ruff format)
        continue-on-error: true
        run: ruff format --check .

      - name: SAST (semgrep — generic rules, advisory)
        continue-on-error: true
        run: |
          pip install semgrep
          semgrep --config auto . --error || true

      - name: Install project test deps
        continue-on-error: true
        run: pip install -e ".[test]" || pip install pytest pytest-cov

      - name: Tests + coverage (floor 20%, advisory)
        continue-on-error: true
        run: pytest --cov=openmanus_rl --cov-report=term-missing --cov-fail-under=20 -q
